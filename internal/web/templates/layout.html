{{define "layout"}}<!DOCTYPE html>
<html lang="en" data-theme="luxury">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Triage Dashboard</title>
  <link rel="stylesheet" href="/static/output.css">
  <style>[x-cloak] { display: none !important; }</style>
  <script>
    document.documentElement.setAttribute('data-theme',
      localStorage.getItem('theme') || 'luxury');
  </script>
  <script src="/static/htmx.min.js" defer></script>
  <script src="/static/sse.js" defer></script>
  <script src="/static/morph.js" defer></script>
  <script src="/static/alpine.min.js" defer></script>
  <style>
    .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
    .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity: 1; }
  </style>
</head>
<body class="min-h-screen bg-base-200" hx-headers='js:{"X-CSRF-Token": document.cookie.match(/_csrf=([^;]+)/)?.[1] || ""}'>
  <div class="navbar bg-base-100 shadow-lg">
    <div class="flex-1">
      <a href="/" class="btn btn-ghost text-xl">🔍 Triage Dashboard</a>
    </div>
    <div class="flex-none gap-2" x-data="{ luxury: true }" x-init="
      luxury = localStorage.getItem('theme') !== 'light';
      $watch('luxury', v => {
        document.documentElement.setAttribute('data-theme', v ? 'luxury' : 'light');
        localStorage.setItem('theme', v ? 'luxury' : 'light');
      })">
      <label class="swap swap-rotate btn btn-ghost btn-circle" aria-label="Toggle theme">
        <input type="checkbox" x-model="luxury" aria-label="Switch between dark and light theme" />
        <span class="swap-on">🌙</span>
        <span class="swap-off">☀️</span>
      </label>
    </div>
  </div>
  <main class="container mx-auto px-4 py-6" id="main-content">
    {{template "content" .}}
  </main>
  <div id="toast-container" class="toast toast-top toast-end z-50"></div>
  <script>
    document.addEventListener('htmx:responseError', function(evt) {
      var msg = 'Request failed (status ' + evt.detail.xhr.status + ')';
      showToast(msg, 'alert-error');
    });
    document.addEventListener('htmx:sendError', function() {
      showToast('Network error — check your connection', 'alert-warning');
    });
    function showToast(msg, cls) {
      var el = document.createElement('div');
      el.className = 'alert ' + cls + ' shadow-lg text-sm';
      el.innerHTML = '<span>' + msg + '</span>';
      document.getElementById('toast-container').appendChild(el);
      setTimeout(function() { el.remove(); }, 5000);
    }
  </script>
</body>
</html>{{end}}
