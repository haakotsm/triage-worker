# ImagePullBackOff scenario: Deployment uses a non-existent image tag.
# Fix: kubectl rollout undo deployment/gateway -n demo-apps
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: demo-apps
  labels:
    app: gateway
    deployment: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        deployment: gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/haakotsm/gateway:v99.0.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 128Mi
              cpu: 200m
