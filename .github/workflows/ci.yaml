name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          # Threshold lowered to 35% — web/SSE packages require DB+HTTP integration tests
          if [ "$(echo "$COVERAGE < 35" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below 35% threshold"
            exit 1
          fi

      - name: govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.0

  css:
    # The committed internal/web/static/output.css is embedded via go:embed and
    # used by local `go run`. The Docker image regenerates it, but local dev (and
    # this CI's `go test`) use the committed copy — which silently drifts when
    # templates / Go class-generators / init.js change. Regenerate with the same
    # pinned deps and fail if the committed file is stale.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pinned CSS toolchain
        run: cd .css-build && npm ci --no-audit --no-fund

      - name: Regenerate output.css
        run: cd .css-build && npx @tailwindcss/cli -i app.css -o ../internal/web/static/output.css --minify

      - name: Fail if committed output.css is stale
        run: |
          if ! git diff --quiet -- internal/web/static/output.css; then
            echo "::error::internal/web/static/output.css is out of date. Regenerate it:"
            echo "  cd .css-build && npm ci && npx @tailwindcss/cli -i app.css -o ../internal/web/static/output.css --minify"
            git diff --stat -- internal/web/static/output.css
            exit 1
          fi
          echo "output.css is up to date."

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint, css]
    permissions:
      contents: read
      packages: write
    env:
      PUBLISH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: env.PUBLISH == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ env.PUBLISH == 'true' }}
          cache-from: type=gha
          cache-to: ${{ env.PUBLISH == 'true' && 'type=gha,mode=max' || '' }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:0.1.0
